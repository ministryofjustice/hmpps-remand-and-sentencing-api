spring:
  datasource:
    url: "jdbc:postgresql://localhost:5432/ras"
    username: "ras-user"
    password: "ras-pass"

hmpps:
  auth:
    url: http://localhost:9090/auth
  sar:
    enabled: true
    mode:
      all-sar-data:
        enabled: false
    additionalAccessRole: ROLE_VIEW_PRISONER_DATA # Supports local testing
    template:
      path: /templates/template_remand-and-sentencing-api.mustache
      enabled: true
  sqs:
    provider: localstack
    queues:
      prisonerlistener:
        queueName: "prisonerlistener-${random.uuid}"
        dlqName: "prisonerlistener-dlq-${random.uuid}"
        subscribeTopicId: hmppsdomaintopic
        subscribeFilter: "{\"eventType\":[\"prison-offender-events.prisoner.booking.moved\"]}"
        dlqMaxReceiveCount: 3
        visibilityTimeout: 120
    topics:
      hmppsdomaintopic:
        arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}

prison:
  api:
    url: http://localhost:8332

court-register:
  api:
    url: http://localhost:8333

document:
  management:
    api:
      url: http://localhost:8442

adjustments:
  api:
    url: http://localhost:8552

ingress:
  url: localhost:8080

features:
  appeals:
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true