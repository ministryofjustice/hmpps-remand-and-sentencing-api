---
# Per environment values which override defaults in hmpps-remand-and-sentencing-api/values.yaml

generic-service:

  ingress:
    host: &ingressHost remand-and-sentencing-api-dev.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    HMPPS_AUTH_URL: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    PRISON_API_URL: https://prison-api-dev.prison.service.justice.gov.uk
    DOCUMENT_MANAGEMENT_API_URL: "https://document-api-dev.hmpps.service.justice.gov.uk"
    ADJUSTMENTS_API_URL: "https://adjustments-api-dev.hmpps.service.justice.gov.uk"
    COURT-REGISTER_API_URL: https://court-register-api-dev.hmpps.service.justice.gov.uk
    INGRESS_URL: *ingressHost
    ENVIRONMENT_NAME: DEV
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    FEATURES_APPEALS_ENABLED: "true"
    HMPPS_SAR_ENABLED: "true"
    HMPPS_SAR_MODE_ALL-SAR-DATA_ENABLED: "false"
    HMPPS_SAR_TEMPLATE_PATH: /templates/template_remand-and-sentencing-api.mustache
    HMPPS_SAR_TEMPLATE_ENABLED: "true"

  resources:
    requests:
      memory: 2G
    limits:
      memory: 4G

  scheduledDowntime:
    enabled: true
  # Switches off the allow list in the DEV env only.
  allowlist: null
# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: legacy-replacement-alerts-non-prod

generic-data-analytics-extractor:
  enabled: true
  cronJobSchedule: "30 7 * * 1-5"
  dataProductName: hmpps_remand_and_sentencing_dev

documentCleanCronjob:
  schedule: "0 7 * * 1-5"
